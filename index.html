<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin:0;
    font-family: Arial;
    background-color: #FAF3E0; /* cream background */
    overflow-x: hidden; /* prevent horizontal scroll */
}

/* ===== SECTION 1 ===== */
.section1 {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
}

/* ===== SECTION 2 ===== */
.section2 {
    height:100vh;
    position:relative;
    overflow:hidden;
}

.image {
    position:absolute;
    top:40%;
    width:25%; /* responsive width */
}

/* start offscreen for desktop */
#leftImg {
    left:-25%;
}

#rightImg {
    right:-25%;
}

#centerText {
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    opacity:0;
}

/* ===== SECTION 3 ===== */
.section3 {
    height:100vh;
    position:relative;
    overflow:hidden;
}

#movingImage {
    position:absolute;
    top:40%;
    left:-30%;
    width:30%;
}

#followText {
    position:absolute;
    top:42%;
    left:-20%;
    font-size:5vw;
    white-space:nowrap;
}

/* ===== MEDIA QUERIES FOR MOBILE ===== */
@media screen and (max-width: 768px) {
    #leftImg, #rightImg {
        width:40%;
        left:-40%;
        right:-40%;
    }

    #movingImage {
        width:50%;
        left:-50%;
    }

    #followText {
        font-size:6vw;
        left:-30%;
    }
}
</style>
</head>
<body>

<!-- Section 1 -->
<div class="section1">
    hi reen
</div>

<!-- Section 2 -->
<div class="section2">
    <img id="leftImg" class="image" src="flowers2.png" alt="Left Image">
    <img id="rightImg" class="image" src="flowers.png" alt="Right Image">
    <div id="centerText">im sorry</div>
</div>

<!-- Section 3 -->
<div class="section3">
    <img id="movingImage" src="moody.png" alt="Moving Image">
    <div id="followText">i tak sengaja buat macam tu</div>
</div>

<script>
// ===== GET ELEMENTS =====
let left = document.getElementById("leftImg");
let right = document.getElementById("rightImg");
let text = document.getElementById("centerText");

let img = document.getElementById("movingImage");
let followText = document.getElementById("followText");

// ===== SCROLL EVENT =====
window.addEventListener("scroll", function() {

    let scroll = window.scrollY;

    /* ----- SECTION 2: images moving toward center ----- */
    let maxMove2 = (window.innerWidth/2 - left.offsetWidth/2 - 20); // 20px padding
    let move2 = scroll * 0.5;
    if(move2 > maxMove2) move2 = maxMove2;

    left.style.left = (-left.offsetWidth) + move2 + "px";
    right.style.right = (-right.offsetWidth) + move2 + "px";

    if(move2 > 200){
        text.style.opacity = 1;
    }

    /* ----- SECTION 3: image moves left->right, text trails ----- */
    let maxMove3 = window.innerWidth - img.offsetWidth - 20; // prevent going offscreen
    let imgMove = scroll * 0.5;
    if(imgMove > maxMove3) imgMove = maxMove3;
    img.style.transform = `translateX(${imgMove}px)`;

    let textMove = scroll * 0.35; // trails behind
    if(textMove > maxMove3) textMove = maxMove3;
    followText.style.transform = `translateX(${textMove}px)`;

});
</script>

</body>
</html>
