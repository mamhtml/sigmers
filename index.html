<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
}

/* GENERAL SECTION STYLE */
section {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    box-sizing:border-box;
    color:#fff;
}

/* SECTION COLORS */
#section1 { background-color: #FFADAD; } /* soft red */
#section2 { background-color: #FFD6A5; } /* soft orange */
#section3 { background-color: #FDFFB6; color:#333; } /* soft yellow */
#section4 { background-color: #CAFFBF; color:#333; } /* soft green */

/* TEXT STYLE */
.text-box {
    max-width: 500px;
    font-size: 1.5rem;
    line-height:1.6;
}

/* SECTION 2 IMAGE LEFT */
#section2 .container {
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

#section2 img {
    width:300px;
    max-width: 40%;
}

/* SECTION 3 IMAGE RIGHT */
#section3 .container {
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

#section3 img {
    width:300px;
    max-width: 40%;
    order:2; /* image on right */
}

/* SECTION 4 IMAGE BELOW TEXT */
#section4 .container {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

#section4 img {
    width:250px;
    max-width: 50%;
}

/* RESPONSIVE */
@media screen and (max-width:768px) {
    #section2 img,
    #section3 img,
    #section4 img {
        width:80%;
        max-width: none;
    }

    .text-box {
        font-size:1.2rem;
    }

    #section3 .container {
        flex-direction:column-reverse;
    }
}
</style>
</head>
<body>

<!-- SECTION 1 -->
<section id="section1">
    <div class="text-box">
        hai reen
    </div>
</section>

<!-- SECTION 2 -->
<section id="section2">
    <div class="container">
        <img src="moody.png" alt="Moody Image">
        <div class="text-box">
            i tak sengaja buat macam tu last night, i never intended to do that.
        </div>
    </div>
</section>

<!-- SECTION 3 -->
<section id="section3">
    <div class="container">
        <div class="text-box">
            I tahu you going through a lot right now. I know you are strong enough to handle it. I always doakan untuk you sayang.
        </div>
        <img src="flowers.png" alt="Flowers Image">
    </div>
</section>

<!-- SECTION 4 -->
<section id="section4">
    <div class="container">
        <div class="text-box">
            I love you, reen
        </div>
        <img src="love.png" alt="Love Image">
    </div>
</section>

<script>
// Optional: play audio via JS in case autoplay is blocked
window.addEventListener('load', function() {
    const audio = document.getElementById('backgroundAudio');
    audio.play().catch(() => {
        console.log('Autoplay blocked, user interaction required.');
    });
});
</script>

</body>
</html>
